<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        padding: 16px;
        font: 12px/1.4 "Inter", -apple-system, system-ui, sans-serif;
        background: var(--figma-color-bg);
        color: var(--figma-color-text);
      }
      label { display: block; margin-bottom: 4px; color: var(--figma-color-text-secondary); }
      input[type="number"] {
        width: 100%;
        padding: 6px 8px;
        background: var(--figma-color-bg-secondary);
        color: var(--figma-color-text);
        border: 1px solid var(--figma-color-border);
        border-radius: 4px;
        box-sizing: border-box;
      }
      .row { display: flex; gap: 8px; margin-top: 12px; }
      button {
        flex: 1;
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid var(--figma-color-border);
        background: var(--figma-color-bg);
        color: var(--figma-color-text);
        cursor: pointer;
        font: inherit;
      }
      button.primary {
        background: var(--figma-color-bg-brand);
        color: var(--figma-color-text-onbrand);
        border-color: var(--figma-color-bg-brand);
      }
      button.primary:hover { background: var(--figma-color-bg-brand-hover); }
    </style>
  </head>
  <body>
    <label for="count">Number of rectangles</label>
    <input id="count" type="number" value="5" min="1" max="50" />
    <div class="row">
      <button id="cancel">Cancel</button>
      <button id="create" class="primary">Create</button>
    </div>

    <script>
      document.getElementById("create").onclick = () => {
        const count = parseInt(document.getElementById("count").value, 10) || 1;
        parent.postMessage({ pluginMessage: { type: "create-rectangles", count } }, "*");
      };
      document.getElementById("cancel").onclick = () => {
        parent.postMessage({ pluginMessage: { type: "close" } }, "*");
      };
    </script>
  </body>
</html>
